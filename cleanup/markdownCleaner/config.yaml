# ============================================================
# OCR Markdown Cleanup Pipeline Configuration
# ============================================================


pipeline:

  name: "Novel OCR Cleanup"

  version: "1.0"



# ------------------------------------------------------------
# File paths
# ------------------------------------------------------------

paths:

  backup_directory: "backup"

  output_directory: "output"

  temp_directory: "temp"



# ------------------------------------------------------------
# Backup settings
# ------------------------------------------------------------

backup:

  enabled: true

  directory: "backup"

  keep_history: true

  include_hash: true



# ------------------------------------------------------------
# Unicode normalization
# ------------------------------------------------------------

unicode:

  enabled: true


  normalize_form: "NFKC"


  fixes:

    ligatures: true

    invisible_characters: true

    whitespace: true

    punctuation: true



# ------------------------------------------------------------
# Regex OCR correction
# ------------------------------------------------------------

regex:

  enabled: true


  rules_file:

    "data/ocr_rules.yaml"


  corrections:


    #
    # OCR character replacements
    #

    rn_to_m:

      enabled: true


    zero_to_o:

      enabled: true


    one_to_l:

      enabled: true



    #
    # Word cleanup
    #

    broken_hyphen_words:

      enabled: true


    repeated_characters:

      enabled: true



# ------------------------------------------------------------
# SymSpell correction
# ------------------------------------------------------------

symspell:

  enabled: true


  dictionary:

    "data/english_frequency.txt"


  glossary:

    "data/custom_words.json"


  learned:

    "data/learned_words.json"



  max_edit_distance: 2


  confidence_threshold: 85



  #
  # Do not modify words
  #

  protected:

    - "Ainz"

    - "Yggdrasil"

    - "Nazarick"



# ------------------------------------------------------------
# Reporting
# ------------------------------------------------------------

report:


  enabled: true


  export_json: true


  export_summary: true


  include_low_confidence: true



# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------

logging:

  level: "INFO"


  file:

    "logs/pipeline.log"