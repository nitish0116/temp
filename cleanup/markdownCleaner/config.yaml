pipeline:
  name: "Novel OCR Cleanup"
  version: "2.0"

paths:
  backup_directory: "backup"
  output_directory: "output"
  temp_directory: "temp"

backup:
  enabled: true
  directory: "backup"
  keep_history: true
  include_hash: true

cleanup:
  enabled: true
  remove_picture_ocr: true
  remove_front_matter: true
  remove_back_matter: true
  remove_footnotes: true

unicode:
  enabled: true
  normalize_form: "NFKC"
  fixes:
    ligatures: true
    invisible_characters: true
    whitespace: true
    punctuation: true

regex:
  enabled: true
  corrections:
    # Dangerous global substitutions such as rn->m are deliberately disabled.
    rn_to_m:
      enabled: false
    zero_to_o:
      enabled: true
    one_to_l:
      enabled: true
    broken_hyphen_words:
      enabled: true
    repeated_characters:
      enabled: true

symspell:
  # Disabled by default unless you provide a real frequency dictionary.
  # An empty/missing dictionary gives no useful corrections and aggressive
  # spell correction can damage names in fiction.
  enabled: false
  dictionary: "data/english_frequency.txt"
  glossary: "data/custom_words.json"
  learned: "data/learned_words.json"
  max_edit_distance: 2
  confidence_threshold: 92
  protected:
    - "Ainz"
    - "Yggdrasil"
    - "Nazarick"

report:
  enabled: true
  export_json: true
  export_summary: true
  include_low_confidence: true

logging:
  level: "INFO"
  directory: "logs"
  file: "logs/pipeline.log"
