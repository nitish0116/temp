pipeline:
  name: "Novel OCR Cleanup"
  version: "2.0"

paths:
  backup_directory: "backup"
  output_directory: "output"
  temp_directory: "temp"

backup:
  enabled: true
  directory: "backup"
  keep_history: true
  include_hash: true

cleanup:
  enabled: true
  remove_picture_ocr: true
  remove_front_matter: true
  # Sequence-independent cleanup: only explicitly named sections are removed.
  # Other sections are always retained regardless of where they appear.
  excluded_sections:
    - "Afterword"
    - "Aferword"
    - "Character Profiles"
    - "Character Profile"
    - "Character Profles"
    - "Character Profle"
  # Picture OCR modes: safe | keep | remove. Safe preserves readable captions,
  # profiles, diagrams, etc. and removes only likely gibberish.
  picture_ocr_mode: "safe"
  remove_promotional_tail: true
  remove_publisher_tail: true
  remove_glossary_footnotes: true
  remove_footnotes: true
  strip_markdown_emphasis: true
  # Report suspicious whole-document OCR lines but never delete them.
  report_ocr_noise: true
  ocr_noise_report_limit: 100

tts_validation:
  # Report-only validation; cleaned Markdown is never modified by this stage.
  enabled: true
  chunk_size: 2600
  minimum_alpha: 4
  report_limit: 200

unicode:
  enabled: true
  normalize_form: "NFKC"
  fixes:
    ligatures: true
    invisible_characters: true
    whitespace: true
    punctuation: true

regex:
  enabled: true
  corrections:
    # Dangerous global substitutions such as rn->m are deliberately disabled.
    rn_to_m:
      enabled: false
    zero_to_o:
      enabled: true
    one_to_l:
      enabled: true
    broken_hyphen_words:
      enabled: true
    repeated_characters:
      enabled: true

symspell:
  enabled: true
  # Uses the 82k English frequency dictionary shipped by the symspellpy package.
  dictionary: "builtin:en-82k"
  glossary: "data/custom_words.json"
  learned: "data/learned_words.json"
  max_edit_distance: 2
  max_auto_edit_distance: 1
  confidence_threshold: 92
  minimum_word_length: 4
  minimum_dictionary_frequency: 1
  minimum_candidate_frequency: 1000
  # Conservative threshold for joining PDF/OCR spaces inside words.
  broken_word_merge_minimum_frequency: 50000
  # Broader corpus evidence for words omitted from the compact dictionary.
  wordfreq_enabled: true
  wordfreq_language: "en"
  wordfreq_wordlist: "large"
  wordfreq_minimum_zipf: 2.5
  ambiguity_margin: 2
  auto_protect_proper_nouns: true
  proper_noun_min_occurrences: 2
  protected:
    - "Ainz"
    - "Yggdrasil"
    - "Nazarick"

vocabulary_candidates:
  # Discover repeated unknown terms, but never modify custom_words.json.
  enabled: true
  minimum_occurrences: 3
  report_limit: 200
  # Reviewed terms that should no longer appear as pending candidates.
  rejected: "data/rejected_words.json"

report:
  enabled: true
  export_json: true
  export_summary: true
  include_low_confidence: true

logging:
  level: "INFO"
  directory: "logs"
  file: "logs/pipeline.log"
